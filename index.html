<script type="module">

window.verifyCert = async function () {
    const certInput = document.getElementById("certSearch").value.trim();
    const resultCard = document.getElementById("resultCard");
    resultCard.style.display = "block";
    resultCard.innerHTML = "⏳ Verifying...";
window.verify = async function () {
    const input = document.getElementById("certInput").value.trim();
    const result = document.getElementById("result");

    result.innerHTML = "⏳ Verifying...";

    if (!certInput) {
        resultCard.innerHTML = "<p class='not-found'>Please enter a certification number.</p>";
    if (!input) {
        result.innerHTML = "<p class='error'>Enter a certification number.</p>";
        return;
    }

    try {
        const certRef = ref(database, certInput);
        const snapshot = await get(certRef);

        if (snapshot.exists()) {
            const data = snapshot.val();
            let output = `<h2 class='verified'>Certification # ${certInput}</h2>`;

            if (data.image1 || data.image2) {
                output += `<div class="images-row">`;
                if (data.image1) output += `<img src="${data.image1}">`;
                if (data.image2) output += `<img src="${data.image2}">`;
                output += `</div>`;
            }

            if (data.grade) {
                const label = getPSALabel(data.grade);
                const gradeColor = (data.grade === "Alt") ? "#ff4d4d" : "#4dff88";
                output += `<h2 style="text-align:center; margin:10px 0; color:${gradeColor};">
                    Grade: ${data.grade} (${label})
                </h2>`;
            }

            if (data.subgrades) {
                output += `<div style="text-align:center; margin:10px 0;">
                    <strong>Subgrades:</strong><br>
                    Centering: ${data.subgrades.centering || "N/A"} |
                    Edges: ${data.subgrades.edges || "N/A"} |
                    Surface: ${data.subgrades.surface || "N/A"} |
                    Corners: ${data.subgrades.corners || "N/A"}
                </div>`;
            }

            let statusColor = "#4dff88"; 
            if (!data.status || data.status.toLowerCase() === "inactive" || data.status.toLowerCase() === "revoked") {
                statusColor = "#ff4d4d";
            }

            output += `<div style="text-align:center; font-weight:bold; margin:10px 0; color:${statusColor};">
                Status: ${data.status || "N/A"}
            </div>`;

            output += `<h3>Owner</h3>
                       <p><strong>Full Name:</strong> ${data.owner || "N/A"}</p>`;

            output += `<h3>Card Information</h3>`;
            const fields = ["pokemon", "set", "year", "finish", "notation", "declared_value"];
            fields.forEach(f => {
                output += `<p><strong>${f.charAt(0).toUpperCase() + f.slice(1).replace("_"," ")}:</strong> ${data[f] || "N/A"}</p>`;
            });

            resultCard.innerHTML = output;
        } else {
            resultCard.innerHTML = "<h2 class='not-found'>❌ Certification Not Found</h2>";
        const snapshot = await get(ref(db, input));

        if (!snapshot.exists()) {
            result.innerHTML = "<p class='error'>❌ Certification Not Found</p>";
            return;
        }
    } catch (error) {
        resultCard.innerHTML = "<h2 class='not-found'>Database Connection Error</h2>";
        console.error(error);
    }
};

window.goToSubmit = function () {
    window.location.href = "https://fusionslab.github.io/FusionSlab-Submission-Center/";
        const data = snapshot.val();

        let html = `<h2 class="verified">Certification #${input}</h2>`;

        // Images
        if (data.image1 || data.image2) {
            html += `<div class="images">`;
            if (data.image1) html += `<img src="${data.image1}">`;
            if (data.image2) html += `<img src="${data.image2}">`;
            html += `</div>`;
        }

        // Grade
        if (data.grade) {
            html += `<p><strong>Grade:</strong> ${data.grade} (${getGradeLabel(data.grade)})</p>`;
        }

        // Status
        html += `<p><strong>Status:</strong> ${data.status || "N/A"}</p>`;

        // Owner
        html += `<h3>Owner</h3>`;
        html += `<p><strong>Name:</strong> ${data.owner || "N/A"}</p>`;

        // Card Info (YOUR EXACT ORDER)
        html += `<h3>Card Info</h3>`;

        const fields = [
            "pokemon",
            "set",
            "year",
            "finish",
            "notation",
            "declared_value"
        ];

        fields.forEach(field => {
            html += `
            <p>
                <strong>${field.replace("_", " ").toUpperCase()}:</strong>
                ${data[field] || "N/A"}
            </p>`;
        });

        result.innerHTML = html;

    } catch (err) {
        result.innerHTML = "<p class='error'>Database Error</p>";
        console.error(err);
    }
};
</script>
