<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FusionSlab</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

input {
    padding: 12px;
    width: 260px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border-radius: 6px;
    border: none;
    background: #00c6ff;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 25px;
    text-align: left;
    max-width: 650px;
    margin-left: auto;
    margin-right: auto;
}

.images {
    display: flex;
    gap: 10px;
    margin: 10px 0;
}

.images img {
    width: 48%;
    border-radius: 8px;
}

.verified {
    color: #4dff88;
    text-align: center;
}

.error {
    color: #ff6b6b;
    text-align: center;
}
</style>
</head>

<body>

<h1>FusionSlab</h1>
<p>Enter Certification Number</p>

<input type="text" id="certInput" placeholder="Certification #">
<br>
<button onclick="verify()">Verify</button>

<div id="result" class="result"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBimLxcEZPGYY7KjX3zKsR_eFCfqPvxHg",
  authDomain: "fusionslab-cert-verification.firebaseapp.com",
  databaseURL: "https://fusionslab-cert-verification-default-rtdb.firebaseio.com",
  projectId: "fusionslab-cert-verification",
  storageBucket: "fusionslab-cert-verification.firebasestorage.app",
  messagingSenderId: "762081069903",
  appId: "1:762081069903:web:d7a070ce1094987c15d33a"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

function getPSALabel(grade) {
    switch (grade) {
        case "10+": return "PERFECT!";
        case "10": return "GEM-MINT";
        case "9": return "MINT";
        case "8": return "NEAR MINT-MINT";
        case "7": return "NEAR MINT";
        case "6": return "EX-MT";
        case "5": return "EXCELLENT";
        case "4": return "VG-EX";
        case "3": return "VERY GOOD";
        case "2": return "GOOD";
        case "1": return "POOR";
        case "ALT": return "ALT";
        default: return "N/A";
    }
}

window.verify = async function () {
    const certInput = document.getElementById("certInput").value.trim();
    const result = document.getElementById("result");

    result.innerHTML = "⏳ Verifying...";

    if (!certInput) {
        result.innerHTML = "<p class='error'>Please enter a certification number.</p>";
        return;
    }

    try {
        const certRef = ref(database, certInput);
        const snapshot = await get(certRef);

        if (snapshot.exists()) {
            const data = snapshot.val();
            let output = `<h2 class='verified'>Certification # ${certInput}</h2>`;

            if (data.image1 || data.image2) {
                output += `<div class="images">`;
                if (data.image1) output += `<img src="${data.image1}">`;
                if (data.image2) output += `<img src="${data.image2}">`;
                output += `</div>`;
            }

            if (data.grade) {
                const label = getPSALabel(data.grade);
                const gradeColor = (data.grade === "Alt") ? "#ff4d4d" : "#4dff88";
                output += `<h2 style="text-align:center; margin:10px 0; color:${gradeColor};">
                    Grade: ${data.grade} (${label})
                </h2>`;
            }

            if (data.subgrades) {
                output += `<div style="text-align:center; margin:10px 0;">
                    <strong>Subgrades:</strong><br>
                    Centering: ${data.subgrades.centering || "N/A"} |
                    Edges: ${data.subgrades.edges || "N/A"} |
                    Surface: ${data.subgrades.surface || "N/A"} |
                    Corners: ${data.subgrades.corners || "N/A"}
                </div>`;
            }

            let statusColor = "#4dff88"; 
            if (!data.status || data.status.toLowerCase() === "inactive" || data.status.toLowerCase() === "revoked") {
                statusColor = "#ff4d4d";
            }

            output += `<div style="text-align:center; font-weight:bold; margin:10px 0; color:${statusColor};">
                Status: ${data.status || "N/A"}
            </div>`;

            // ✅ OWNER NAME REMOVED (ONLY CHANGE YOU REQUESTED)

            output += `<h3>Card Information</h3>`;
            const fields = ["pokemon", "set", "year", "finish", "notation", "declared_value"];

            fields.forEach(f => {
                output += `<p><strong>${f.charAt(0).toUpperCase() + f.slice(1).replace("_"," ")}:</strong> ${data[f] || "N/A"}</p>`;
            });

            resultCard.innerHTML = output;
        } else {
            resultCard.innerHTML = "<h2 class='not-found'>❌ Certification Not Found</h2>";
        }
    } catch (error) {
        resultCard.innerHTML = "<h2 class='not-found'>Database Connection Error</h2>";
        console.error(error);
    }
};

window.goToSubmit = function () {
    window.location.href = "https://fusionslab.github.io/FusionSlab-Submission-Center/";
};
</script>

</body>
</html>
