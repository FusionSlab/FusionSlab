<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FusionSlab</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #ffffff;
    color: #111;
}

.header {
    background: #0a3d91;
    padding: 18px 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
}

button {
    padding: 10px 14px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    background: #00c6ff;
    color: black;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 40px 20px;
}

.panel {
    background: #f5f7fa;
    padding: 25px;
    border-radius: 10px;
    text-align: center;
}

input {
    width: 80%;
    padding: 15px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.result {
    margin-top: 30px;
    display: none;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 5px 20px rgba(0,0,0,0.10);
}

.result.active {
    display: block;
}

.result-header {
    background: #0a3d91;
    color: white;
    padding: 15px;
}

.result-body {
    padding: 20px;
}

.section {
    margin-bottom: 12px;
}

#authModal {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.auth-box {
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    text-align:center;
}
</style>
</head>

<body>

<div class="header">
    <button id="leftBtn" onclick="goSubmit()">Submit</button>
    <h3>FusionSlab</h3>
    <button onclick="openAuth()">👤</button>
</div>

<div class="container">

    <div class="panel">
        <input id="certSearch" placeholder="Enter Certification Number">
        <br><br>
        <button onclick="verify()">Lookup Record</button>
    </div>

    <div class="result" id="resultBox"></div>
</div>

<!-- AUTH -->
<div id="authModal">
<div class="auth-box">
<h3>Account</h3>

<input id="authEmail" placeholder="Email"><br>
<input id="authPass" type="password" placeholder="Password"><br><br>

<button onclick="signIn()">Sign In</button>
<button onclick="signUp()">Sign Up</button>
<button onclick="closeAuth()">Close</button>

<p id="authStatus"></p>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { 
    getDatabase, 
    ref, 
    get, 
    set 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword,
    onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBimLxcEZPGYY7KJbX3zKsR_eFCfqPvxHg",
  authDomain: "fusionslab-cert-verification.firebaseapp.com",
  databaseURL: "https://fusionslab-cert-verification-default-rtdb.firebaseio.com",
  projectId: "fusionslab-cert-verification",
  storageBucket: "fusionslab-cert-verification.appspot.com",
  messagingSenderId: "762081069903",
  appId: "1:762081069903:web:d7a070ce1094987c15d33a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const auth = getAuth(app);

/* ---------- AUTH UI ---------- */

window.openAuth = () => authModal.style.display = "flex";
window.closeAuth = () => authModal.style.display = "none";

window.signUp = async () => {
    try {
        await createUserWithEmailAndPassword(auth, authEmail.value, authPass.value);
        authStatus.innerText = "Account Created ✔";
    } catch (e) {
        authStatus.innerText = e.message;
    }
};

window.signIn = async () => {
    try {
        await signInWithEmailAndPassword(auth, authEmail.value, authPass.value);
        authStatus.innerText = "Signed In ✔";
    } catch (e) {
        authStatus.innerText = e.message;
    }
};

onAuthStateChanged(auth, user => {
    if (user) authStatus.innerText = "Logged in: " + user.email;
});

/* ---------- VERIFY ---------- */

window.verify = async () => {
    const cert = certSearch.value.trim();
    const box = resultBox;

    const snap = await get(ref(db, cert));
    box.classList.add("active");

    if (!snap.exists()) {
        box.innerHTML = `<div class="result-header">Not Found</div>`;
        return;
    }

    const d = snap.val();

    box.innerHTML = `
        <div class="result-header">Cert # ${cert}</div>
        <div class="result-body">
            <div class="section"><b>Name:</b> ${d.fullName || "N/A"}</div>
            <div class="section"><b>Value:</b> ${d.value || "N/A"}</div>
        </div>
    `;
};

/* ---------- SAVE SUBMISSION ---------- */

window.saveSubmission = async (cert, data) => {
    const user = auth.currentUser;
    if (!user) return alert("Login required");

    await set(ref(db, "submissions/" + user.uid + "/" + cert), {
        ...data,
        time: Date.now()
    });

    alert("Saved ✔");
};

/* ---------- NAV ---------- */

window.goSubmit = () => {
    window.location.href = "https://fusionslab.github.io/FusionSlab-Submission-Center/";
};
</script>

</body>
</html>
