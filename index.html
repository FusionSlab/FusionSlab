<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FusionSlab</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
    padding: 20px;
}

h1 {
    margin-bottom: 10px;
}

input {
    padding: 12px;
    width: 250px;
    border-radius: 6px;
    border: none;
}

button {
    padding: 12px 25px;
    margin: 10px;
    border-radius: 6px;
    border: none;
    background: #00c6ff;
    font-weight: bold;
    cursor: pointer;
}

.result {
    margin-top: 25px;
    text-align: left;
    max-width: 650px;
    margin-left: auto;
    margin-right: auto;
}

.images {
    display: flex;
    gap: 10px;
    margin: 10px 0;
}

.images img {
    width: 48%;
    border-radius: 8px;
}

.verified {
    color: #4dff88;
    text-align: center;
}

.error {
    color: #ff6b6b;
    text-align: center;
}
</style>
</head>

<body>

<h1>FusionSlab</h1>
<p>Enter Certification Number</p>

<input type="text" id="certInput" placeholder="Certification #">
<br>
<button onclick="verify()">Verify</button>

<div id="result" class="result"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBimLxcEZPGYY7KjX3zKsR_eFCfqPvxHg",
  authDomain: "fusionslab-cert-verification.firebaseapp.com",
  databaseURL: "https://fusionslab-cert-verification-default-rtdb.firebaseio.com",
  projectId: "fusionslab-cert-verification",
  storageBucket: "fusionslab-cert-verification.firebasestorage.app",
  messagingSenderId: "762081069903",
  appId: "1:762081069903:web:d7a070ce1094987c15d33a"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

function getGradeLabel(grade) {
    switch (grade) {
        case "10+": return "PERFECT";
        case "10": return "GEM-MINT";
        case "9": return "MINT";
        case "8": return "NEAR MINT-MINT";
        case "7": return "NEAR MINT";
        case "6": return "EX-MT";
        case "5": return "EXCELLENT";
        case "4": return "VG-EX";
        case "3": return "VERY GOOD";
        case "2": return "GOOD";
        case "1": return "POOR";
        case "Alt": return "ALT";
        default: return "N/A";
    }
}

window.verify = async function () {
    const input = document.getElementById("certInput").value.trim();
    const result = document.getElementById("result");

    result.innerHTML = "⏳ Verifying...";

    if (!input) {
        result.innerHTML = "<p class='error'>Enter a certification number.</p>";
        return;
    }

    try {
        const snapshot = await get(ref(db, input));

        if (!snapshot.exists()) {
            result.innerHTML = "<p class='error'>❌ Certification Not Found</p>";
            return;
        }

        const data = snapshot.val();

        let html = `<h2 class="verified">Certification #${input}</h2>`;

        // Images
        if (data.image1 || data.image2) {
            html += `<div class="images">`;
            if (data.image1) html += `<img src="${data.image1}">`;
            if (data.image2) html += `<img src="${data.image2}">`;
            html += `</div>`;
        }

        // Grade
        if (data.grade) {
            html += `<p><strong>Grade:</strong> ${data.grade} (${getGradeLabel(data.grade)})</p>`;
        }

        // Status
        html += `<p><strong>Status:</strong> ${data.status || "N/A"}</p>`;

        // Owner
        html += `<h3>Owner</h3>`;
        html += `<p><strong>Name:</strong> ${data.owner || "N/A"}</p>`;

        // Card Info (YOUR EXACT ORDER)
        html += `<h3>Card Info</h3>`;

        const fields = [
            "pokemon",
            "set",
            "year",
            "finish",
            "notation",
            "declared_value"
        ];

        fields.forEach(field => {
            html += `
            <p>
                <strong>${field.replace("_", " ").toUpperCase()}:</strong>
                ${data[field] || "N/A"}
            </p>`;
        });

        result.innerHTML = html;

    } catch (err) {
        result.innerHTML = "<p class='error'>Database Error</p>";
        console.error(err);
    }
};
</script>

</body>
</html>
